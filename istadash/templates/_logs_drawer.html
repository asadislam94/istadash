    <!-- ── Live logs drawer ─────────────────────────────────────────────── -->
    <aside id="logsDrawer" class="logs-drawer" aria-label="Live application logs" hidden>
        <div class="logs-header">
            <span class="logs-title">Live logs</span>
            <div class="logs-controls">
                <button class="logs-btn logs-btn-close" id="logsClose" type="button" aria-label="Close logs">&#x2715;</button>
            </div>
        </div>
        <pre id="logsOutput" class="logs-output" aria-live="polite" aria-atomic="false"></pre>
    </aside>

    <script>
        // ── Live logs drawer ───────────────────────────────────────────────────
        (function () {
            const logsToggle  = document.getElementById('logsToggle');
            const logsDrawer  = document.getElementById('logsDrawer');
            const logsOutput  = document.getElementById('logsOutput');
            const logsClose   = document.getElementById('logsClose');

            const LEVEL_CLASS = { DEBUG: 'log-debug', INFO: 'log-info', WARNING: 'log-warn', ERROR: 'log-error', CRITICAL: 'log-error' };
            const LEVEL_RE    = /\b(DEBUG|INFO|WARNING|ERROR|CRITICAL)\b/;
            const LOGS_URL    = '{{ url_for("logs_read") }}';

            let pollTimer      = null;
            let loadedCount    = 300;
            let logsTotalLines = 0;

            function renderLines(lines) {
                logsOutput.textContent = '';
                lines.forEach((text) => {
                    const span  = document.createElement('span');
                    const match = text.match(LEVEL_RE);
                    if (match) span.className = LEVEL_CLASS[match[1]] || '';
                    span.textContent = text + '\n';
                    logsOutput.appendChild(span);
                });
            }

            function fetchLogs(scrollToBottom) {
                fetch(LOGS_URL + '?n=' + loadedCount)
                    .then((r) => r.json())
                    .then((data) => {
                        if (data.total === logsTotalLines &&
                            data.lines.length === logsOutput.childElementCount) return;
                        const atBottom = scrollToBottom ||
                            (logsOutput.scrollHeight - logsOutput.scrollTop - logsOutput.clientHeight < 50);
                        const prevTop    = logsOutput.scrollTop;
                        const prevHeight = logsOutput.scrollHeight;
                        logsTotalLines   = data.total;
                        renderLines(data.lines);
                        logsOutput.scrollTop = atBottom
                            ? logsOutput.scrollHeight
                            : prevTop + (logsOutput.scrollHeight - prevHeight);
                    })
                    .catch(() => {});
            }

            logsOutput.addEventListener('scroll', () => {
                if (logsOutput.scrollTop > 0 || logsTotalLines <= loadedCount) return;
                const prevHeight = logsOutput.scrollHeight;
                loadedCount = Math.min(loadedCount + 300, 2000);
                fetch(LOGS_URL + '?n=' + loadedCount)
                    .then((r) => r.json())
                    .then((data) => {
                        logsTotalLines = data.total;
                        renderLines(data.lines);
                        logsOutput.scrollTop = logsOutput.scrollHeight - prevHeight;
                    })
                    .catch(() => {});
            });

            function startPolling() {
                loadedCount    = 300;
                logsTotalLines = 0;
                fetchLogs(true);
                pollTimer = setInterval(() => fetchLogs(false), 3000);
            }

            function stopPolling() {
                clearInterval(pollTimer);
                pollTimer = null;
            }

            logsToggle.addEventListener('click', () => {
                const open = logsDrawer.hidden;
                logsDrawer.hidden = !open;
                logsToggle.setAttribute('aria-expanded', String(open));
                if (open) startPolling(); else stopPolling();
            });

            logsClose.addEventListener('click', () => {
                logsDrawer.hidden = true;
                logsToggle.setAttribute('aria-expanded', 'false');
                stopPolling();
            });
        })();
    </script>
