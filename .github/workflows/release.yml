name: Release

# Trigger on annotated version tags, e.g. v0.1.0
on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build a native installer on each platform
  # ─────────────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to check branch ancestry

      - name: Ensure tag is on master
        shell: bash
        run: |
          git fetch origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master || {
            echo "::error::Tag '$GITHUB_REF_NAME' is not reachable from master. Aborting release."
            exit 1
          }

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install system libraries (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnspr4 libnss3 libgbm1 libasound2t64 libxkbfile1 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libxcb-xkb1 libxkbcommon-x11-0 libxrandr2 \
            libxcomposite1 libegl1

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Package app
        run: |
          uv run briefcase create ${{ matrix.platform }}
          uv run briefcase build ${{ matrix.platform }}
          uv run briefcase package ${{ matrix.platform }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          # Briefcase writes all output into dist/
          path: dist/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Gather all three installers and create the GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create/edit a release

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
