name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install system libraries for PyQt6 WebEngine (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnspr4 libnss3 libgbm1 libxcomposite1 \
            libxkbcommon0 libxkbcommon-x11-0 libxrandr2 \
            libasound2t64 libxkbfile1 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-shape0 libxcb-xkb1

      - name: Install dependencies (with dev extras)
        # uv creates / reads uv.lock automatically; --no-managed-python keeps
        # the version pinned by setup-uv above.
        run: uv sync --extra dev --no-managed-python

      - name: Lint
        run: uv run ruff check istadash tests

      - name: Test
        run: uv run pytest --tb=short
